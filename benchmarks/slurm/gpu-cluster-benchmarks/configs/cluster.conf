#!/usr/bin/env bash
# ==============================================================================
# GPU Cluster Benchmark Suite — Cluster Configuration
#
# Edit this file to match your cluster before running benchmarks.
# ==============================================================================

# ── Cluster Identity ──────────────────────────────────────────────────────────
CLUSTER_NAME="slurm"
BENCHMARK_TAG="$(date +%Y%m%d_%H%M%S)"

# ── SLURM Settings ────────────────────────────────────────────────────────────
PARTITION="b300-cl2"                         # SLURM partition for GPU jobs
ACCOUNT=""                              # SLURM account (leave empty if not required)
GPUS_PER_NODE=8                         # GPUs per node (8 for HGX B300)
GPU_TYPE="b300"                         # Used for threshold selection

# ── Multi-Node Settings ──────────────────────────────────────────────────────
NCCL_NODES=2                            # Nodes for NCCL bandwidth tests
TRAIN_NODES=2                           # Nodes for training MFU benchmark
TRAIN_BATCH_SIZE=4
TRAIN_GRAD_ACCUM=4
INFERENCE_NODES=1                       # Nodes for inference benchmark [inference replica throughput (N replicas × TP=K each)]

# ── Container Images ──────────────────────────────────────────────────────────
# Update tags to latest available on your cluster or NGC
CUDA_IMAGE="nvcr.io/nvidia/cuda:13.0.0-devel-ubuntu24.04"
PYTORCH_IMAGE="nvcr.io/nvidia/pytorch:26.03-py3"
NCCL_TEST_IMAGE="nvcr.io/nvidia/pytorch:26.03-py3"
VLLM_IMAGE="vllm/vllm-openai:latest"

# ── HuggingFace ───────────────────────────────────────────────────────────────
# Required for Llama 3.1 (gated model) — used by training and inference benchmarks.
# 1. Accept license at: https://huggingface.co/meta-llama/Llama-3.1-8B
# 2. Get token at: https://huggingface.co/settings/tokens
HF_TOKEN=""

# ── Model Selection ───────────────────────────────────────────────────────────
# Training model — used with FSDP for MFU benchmark
#   Non-gated (no HF_TOKEN needed):
#     "Qwen/Qwen2.5-7B"                 — 7B, good MFU benchmark size
#     "mistralai/Mistral-7B-v0.1"       — 7B, non-gated
#     "tiiuae/falcon-7b"                — 7B, non-gated
#   Gated (needs HF_TOKEN):
#     "meta-llama/Llama-3.1-8B"         — 8B, ClusterMAX reference model
TRAIN_MODEL="Qwen/Qwen2.5-7B"

# Inference model — used with vLLM for throughput/latency benchmark
#   Non-gated:
#     "Qwen/Qwen2.5-14B-Instruct"     — 14B, 40 heads (TP=8 compatible)
#     "Qwen/Qwen2.5-7B-Instruct"      — 7B, 28 heads (TP=1,2,4,7 only)
#     "mistralai/Mistral-7B-Instruct-v0.3" — 7B, 32 heads (TP=1,2,4,8)
#   Gated (needs HF_TOKEN):
#     "meta-llama/Llama-3.1-8B-Instruct"  — 8B, 32 heads (TP=1,2,4,8)
# NOTE: num_attention_heads must be divisible by INFER_TP
INFER_MODEL="Qwen/Qwen2.5-14B-Instruct"
INFER_TP=2    # Tensor parallel degree (must divide num_heads) Should be 8, but for 14B model 2 is more throughput


# ── Container Options ─────────────────────────────────────────────────────────
# Pyxis flags are split into two variables because pyxis's --container-mounts
# is NOT a repeatable flag — if you pass it twice, the second invocation
# silently overrides the first. So we keep mounts in PYXIS_MOUNTS as a
# comma-separated list (no flag prefix) and concatenate per-benchmark dirs
# into a single --container-mounts at submission time.
#
# /dev/infiniband is required for RDMA inside containers on the b300-cl2
# partition (sysfs is auto-mounted but the char devices aren't).
PYXIS_MOUNTS="/scratch/tmp:/tmp,/dev/infiniband:/dev/infiniband"

# Additional non-mount pyxis flags (e.g., --container-save). Leave empty
# unless you need extra options.
PYXIS_COMMON=""
# Example with cached container saves on a shared FS:
# PYXIS_MOUNTS="/scratch/tmp:/tmp,/dev/infiniband:/dev/infiniband,/shared:/shared"
# PYXIS_COMMON="--container-save=/shared/containers"

# ── Network ───────────────────────────────────────────────────────────────────
# NCCL environment variables — adjust for your fabric (NVLink+NVSwitch intra,
# RoCE/IB inter-node). These are starting points; tune per your topology.
#
# All NCCL_*/UCX_*/NVSHMEM_*/HPCX_*/OMPI_MCA_* vars set here propagate
# automatically into every benchmark container via scripts/common.sh
# (write_nccl_env_file). Empty values are skipped.
export NCCL_IB_DISABLE=0                    # 0 = use IB/RoCE, 1 = disable
export NCCL_NET="IB"                        # IB | Socket
export NCCL_SOCKET_IFNAME="bond0"           # OOB sideband (also used for GLOO)
export NCCL_CROSS_NIC=0
export NCCL_IB_GID_INDEX=3                  # RoCEv2 GID
export NCCL_DEBUG="WARN"

# RoCE NICs only (mlx5_12-15 are IB/SHARP on this cluster).
# Order matches GPU-NIC affinity layout.
export NCCL_IB_HCA="=mlx5_0,mlx5_1,mlx5_10,mlx5_11,mlx5_16,mlx5_17,mlx5_20,mlx5_21,mlx5_22,mlx5_23,mlx5_4,mlx5_5,mlx5_8,mlx5_9,mlx5_2,mlx5_3"

# Traffic class / service level — must match switch-side PFC config.
# TC=104 is DSCP 26 (AF31), SL=3 is the matching PCP for that priority.
export NCCL_IB_TC=104
export NCCL_IB_SL=3

# Reliability / scaling
export NCCL_IB_TIMEOUT=22
export NCCL_IB_QPS_PER_CONNECTION=4
export NCCL_IB_SPLIT_DATA_ON_QPS=1

# Topology hints
export NCCL_NET_GDR_LEVEL=PHB               # GPU-Direct RDMA when GPU+NIC share PHB
export NCCL_P2P_LEVEL=NVL                   # P2P only when ranks share NVLink

# ── Thresholds (Expected Minimums) ───────────────────────────────────────────
# These are conservative pass/fail targets. Adjust per your hardware.
# B300 SXM (288GB HBM3e) reference numbers:
GEMM_FP16_TFLOPS_MIN=1800               # Single-GPU FP16 GEMM TFLOPS floor
GEMM_FP8_TFLOPS_MIN=3500                # Single-GPU FP8 GEMM TFLOPS floor
GEMM_FP32_TFLOPS_MIN=150                # Single-GPU FP32 matmul TFLOPS floor
HBM_BW_MIN_GBS=6000                     # HBM bandwidth floor (GB/s)

GEMM_FP16_TFLOPS_MIN=1200
GEMM_FP8_TFLOPS_MIN=2400
GEMM_FP32_TFLOPS_MIN=150
HBM_BW_MIN_GBS=5000

NCCL_INTRA_BW_MIN_GBS=800               # Intra-node all_reduce bus BW floor (GB/s)
NCCL_INTER_BW_MIN_GBS=80                # Inter-node all_reduce bus BW floor (GB/s)

NCCL_INTRA_GATHER_BW_MIN_GBS=620        # all_gather (~75-80% of all_reduce)
NCCL_INTRA_RS_BW_MIN_GBS=620            # reduce_scatter (~75-80% of all_reduce)

#TRAIN_MFU_MIN_PCT=35                    # Minimum MFU % for multinode training
TRAIN_MFU_MIN_PCT=25                    # Minimum MFU % for multinode training (this is low, good for sanity check)

#INFERENCE_THROUGHPUT_MIN_TOKS=5000       # Minimum tok/s for inference benchmark (TP=8)
INFERENCE_THROUGHPUT_MIN_TOKS=3500       # Minimum tok/s for inference benchmark (TP=s)

# ── Output ────────────────────────────────────────────────────────────────────
# Resolve to absolute path — critical because containers have different CWDs
_SUITE_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
RESULTS_DIR="${_SUITE_ROOT}/results/${BENCHMARK_TAG}"
LOG_LEVEL="WARN"                        # DEBUG | INFO | WARN | ERROR
